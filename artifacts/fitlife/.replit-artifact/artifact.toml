kind = "web"
previewPath = "/"
title = "FitLife"
version = "1.0.0"
id = "artifacts/fitlife"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23078

[services.development]
run = "pnpm --filter @workspace/fitlife run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fitlife", "run", "build" ]
serve = "static"
publicDir = "artifacts/fitlife/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23078"
BASE_PATH = "/"
